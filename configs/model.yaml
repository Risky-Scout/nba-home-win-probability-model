selection:
  cutoff: '2026-03-01'
  method: prequential_daily
  validation_start: '2026-01-01'
  validation_end: '2026-03-01'
  metric: prequential_log_loss
  secondary_metrics:
  - prequential_brier
  descriptive_metrics:
  - prequential_auc
  - prequential_accuracy
  tie_break:
  - prequential_brier
  - prequential_auc
  - prequential_accuracy
  - n_features
  - architecture
  folds:
  - name: fold1_jan
    train_end: '2026-01-01'
    validation_start: '2026-01-01'
    validation_end: '2026-02-01'
  - name: fold2_feb
    train_end: '2026-02-01'
    validation_start: '2026-02-01'
    validation_end: '2026-03-01'
search_budget:
  elo_k:
  - 5.0
  - 10.0
  - 20.0
  - 30.0
  elo_hfa:
  - 50.0
  - 65.0
  - 80.0
  trend_half_life_days:
  - 20.0
  - 45.0
  logistic_c:
  - 0.01
  - 0.03
  - 0.1
  - 0.3
  - 1.0
  - 3.0
  - 10.0
  feature_sets:
    elo_only:
    - elo_diff
    elo_bt:
    - elo_diff
    - bt_logit
    elo_bt_trend:
    - elo_diff
    - bt_logit
    - trend_diff
  rationale:
    elo_k: Very slow to fast sequential rating adaptation.
    elo_hfa: "Home advantage 50/65/80 Elo points (~57\u201361% for equal teams)."
    trend_half_life_days: Short / medium form memory (trend-free sets skip this axis).
    logistic_c: Log-spaced L2 strength.
    feature_sets: Nested ladder from Elo-only to all leakage-safe CSV-derivable signals.
    dedup: Half-life only varies for sets containing trend_diff; trend-free sets are
      evaluated once per (K, HFA).
    search_size: 12 trend-free arch x 2 sets x 7 C = 168, plus 24 trend arch x 3 sets
      x 7 C = 504 -> 672 candidates, each judged on ~450 prequential games.
feature_defaults:
  elo_hfa: 65.0
  elo_mov: log
  bt_c: 0.15
  trend_short_games: 10
  elo_model_c: 1.0
  rank_model_c: 0.1
challenger:
  enabled: false
  elo_weight: 0.2
evaluation:
  locked_test:
    period_start: '2026-03-01'
    period_end: '2026-04-01'
    scored_once: true
  forecast:
    information_cutoff: '2026-03-31'
    period_start: '2026-04-01'
  bootstrap:
    repeats: 5000
    seed: 2026
    block: game_date
baselines:
- constant_home_rate
- record_difference_logistic
- elo_only_logistic
- selected_model
output:
  model_version: 2.2.0
  predictions_dir: predictions
  primary_file: april_predictions.csv
  rolling_scenario_file: april_predictions_rolling_scenario.csv
