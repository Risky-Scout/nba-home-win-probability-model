name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check nba_wp scripts tests --select E9,F63,F7,F82,F401,F821
      - name: Unit and synthetic end-to-end tests
        run: python -m pytest -q --cov=nba_wp --cov-report=term-missing --cov-fail-under=70
      - run: python -m compileall nba_wp scripts run_submission.py validate_submission.py
      - name: Pyright (advisory)
        continue-on-error: true
        run: |
          python -m pip install pyright==1.1.398
          pyright nba_wp --level error
